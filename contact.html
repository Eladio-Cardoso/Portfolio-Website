<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Contact — get in touch via email or social links." />
  <title>Contact — Portfolio</title>

  <!-- ===== Tailwind CSS (CDN) ===== -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- ===== Font: JetBrains Mono (monospace) ===== -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />

  <!-- ===== Tailwind Config ===== -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            mono: ['"JetBrains Mono"', 'Courier New', 'Courier', 'monospace'],
          },
        },
      },
    };
  </script>

  <!-- ===== Inline Styles ===== -->
  <style>
    .page-content {
      animation: fadeIn 0.4s ease-in-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #000;
    }

    ::-webkit-scrollbar-thumb {
      background: #333;
    }

    .nav-link {
      position: relative;
      transition: color 0.15s;
    }

    .nav-link::after {
      content: '';
      position: absolute;
      left: 0;
      bottom: -2px;
      width: 0;
      height: 1px;
      background: #fff;
      transition: width 0.2s;
    }

    .nav-link:hover::after,
    .nav-link.active-link::after {
      width: 100%;
    }
  </style>
</head>

<body class="bg-black text-white font-mono min-h-screen">

  <!-- =====================================================
       NAVIGATION — Fixed top bar
       ===================================================== -->
  <nav id="main-nav" class="fixed top-0 left-0 w-full z-50 bg-black border-b border-neutral-800">
    <div class="max-w-5xl mx-auto flex flex-wrap items-center justify-center
             sm:justify-end gap-x-8 gap-y-2 px-6 py-4 text-sm uppercase tracking-widest">
      <a href="bio.html"
        class="nav-link text-white no-underline text-sm uppercase tracking-widest font-mono">
        Bio
      </a>
      <a href="projects.html"
        class="nav-link text-white no-underline text-sm uppercase tracking-widest font-mono">
        Projects
      </a>
      <a href="contact.html"
        class="nav-link active-link text-white no-underline text-sm uppercase tracking-widest font-mono">
        Contact
      </a>
    </div>
  </nav>

  <!-- =====================================================
       MAIN CONTENT — Contact
       ===================================================== -->
  <main class="pt-20 px-6 pb-16 max-w-4xl mx-auto">
    <div class="page-content min-h-[70vh] flex flex-col justify-center">
      <h1 class="text-3xl sm:text-4xl font-bold uppercase tracking-wider mb-10">
        Contact
      </h1>

      <!--
        ★ REPLACE CONTACT INFO ★
        Update the mailto link and social URLs with your own.
      -->
      <div class="space-y-4 text-neutral-300 max-w-2xl">
        <p>
          <a id="contact-email" href="mailto:hello@example.com"
            class="underline underline-offset-4 hover:text-white transition-colors">
            hello@example.com
          </a>
        </p>
        <p>
          <a id="contact-github" href="https://github.com" target="_blank" rel="noopener noreferrer"
            class="underline underline-offset-4 hover:text-white transition-colors">
            GitHub
          </a>
        </p>
        <p>
          <a id="contact-linkedin" href="https://linkedin.com" target="_blank" rel="noopener noreferrer"
            class="underline underline-offset-4 hover:text-white transition-colors">
            LinkedIn
          </a>
        </p>
        <p>
          <a id="contact-twitter" href="https://twitter.com" target="_blank" rel="noopener noreferrer"
            class="underline underline-offset-4 hover:text-white transition-colors">
            Twitter / X
          </a>
        </p>
      </div>
    </div>
  </main>

</body>

</html>
